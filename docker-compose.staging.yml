version: '3.8'

services:
  app:
    build: .
    container_name: grade-tracker-staging
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - NODE_ENV=staging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3